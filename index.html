<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Native Plant Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bark:   #1e1209;
  --moss:   #2d4a1e;
  --fern:   #4a7a30;
  --sage:   #7aaa58;
  --mist:   #c8ddb8;
  --cream:  #f0ead8;
  --gold:   #c4973a;
  --rust:   #8b3a1e;
  --sky:    #5a8fa8;
  --bg:     #141a0f;
  --card:   rgba(255,255,255,0.04);
  --border: rgba(122,170,88,0.15);
  --text:   #d8e8c8;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;font-weight:300;background:var(--bg);color:var(--text);}
body{
  background-image:
    radial-gradient(ellipse 80% 60% at 10% 0%, rgba(45,74,30,0.5) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 90% 100%, rgba(30,45,15,0.6) 0%, transparent 60%);
  min-height:100vh;
}

/* ── Layout ── */
#app { display:flex; height:100vh; overflow:hidden; }
#sidebar {
  width:260px; flex-shrink:0;
  background:rgba(0,0,0,0.3);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
}
#main { flex:1; overflow-y:auto; display:flex; flex-direction:column; }

/* ── Sidebar ── */
.sidebar-logo {
  padding:1.8rem 1.5rem 1.2rem;
  border-bottom:1px solid var(--border);
}
.sidebar-logo h1 {
  font-family:'Playfair Display',serif;
  font-size:1.25rem; color:var(--mist);
  line-height:1.2;
}
.sidebar-logo p { font-size:0.72rem; color:var(--sage); margin-top:0.3rem; letter-spacing:0.06em; text-transform:uppercase; }

.sidebar-nav { flex:1; overflow-y:auto; padding:1rem 0; }
.nav-section { padding:0.4rem 1.2rem 0.2rem; font-size:0.65rem; color:var(--fern); letter-spacing:0.12em; text-transform:uppercase; }
.nav-item {
  display:flex; align-items:center; gap:0.7rem;
  padding:0.6rem 1.5rem; font-size:0.85rem; color:var(--mist);
  cursor:pointer; transition:all 0.15s; border-left:2px solid transparent;
}
.nav-item:hover { background:rgba(122,170,88,0.08); color:var(--cream); }
.nav-item.active { background:rgba(122,170,88,0.12); border-left-color:var(--sage); color:var(--cream); }
.nav-icon { font-size:1rem; width:20px; text-align:center; }

.sidebar-stats {
  padding:1rem 1.5rem;
  border-top:1px solid var(--border);
}
.sidebar-stat { display:flex; justify-content:space-between; align-items:center; padding:0.3rem 0; }
.sidebar-stat-label { font-size:0.75rem; color:var(--sage); }
.sidebar-stat-value { font-size:0.85rem; color:var(--cream); font-weight:500; }

.sync-status {
  padding:0.7rem 1.5rem;
  border-top:1px solid var(--border);
  font-size:0.72rem;
  display:flex; align-items:center; gap:0.5rem;
}
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--sage); flex-shrink:0; }
.sync-dot.syncing { background:var(--gold); animation:pulse 1s infinite; }
.sync-dot.error   { background:var(--rust); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Main header ── */
#main-header {
  padding:1.5rem 2.5rem 1rem;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
  background:rgba(0,0,0,0.15);
}
.page-title { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--mist); }
.page-subtitle { font-size:0.8rem; color:var(--sage); margin-top:0.2rem; }
.header-actions { display:flex; gap:0.7rem; }
.btn {
  display:flex; align-items:center; gap:0.4rem;
  padding:0.5rem 1.1rem; border-radius:8px; font-size:0.82rem;
  font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s;
  border:1px solid var(--border);
}
.btn-primary { background:var(--fern); border-color:var(--sage); color:var(--cream); }
.btn-primary:hover { background:#5a8f3a; }
.btn-secondary { background:rgba(255,255,255,0.05); color:var(--mist); }
.btn-secondary:hover { background:rgba(255,255,255,0.1); }

/* ── Page content ── */
#loading {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:60vh; gap:1rem; padding:2rem 2.5rem;
}
#page-content { flex:1; padding:2rem 2.5rem; }
.loading-spinner {
  width:40px; height:40px; border:3px solid var(--border);
  border-top-color:var(--sage); border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:0.9rem; color:var(--sage); }

/* ── Dashboard grid ── */
.dash-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:1.5rem;
}
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:1.5rem;
  animation:fadeUp 0.4s ease both;
}
.card.wide { grid-column:1/-1; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.card-title { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--mist); margin-bottom:0.2rem; }
.card-sub { font-size:0.74rem; color:var(--sage); margin-bottom:1.2rem; text-transform:uppercase; letter-spacing:0.05em; }

/* ── Leaderboard ── */
.lb-tier { border:1px solid; border-radius:12px; padding:1.1rem 1.2rem; margin-bottom:1rem; }
.lb-tier-header { display:flex; align-items:flex-start; gap:0.7rem; margin-bottom:0.8rem; }
.lb-tier-emoji { font-size:1.4rem; flex-shrink:0; }
.lb-tier-title { font-family:'Playfair Display',serif; font-size:0.95rem; font-weight:700; }
.lb-tier-desc  { font-size:0.75rem; color:var(--sage); margin-top:0.1rem; }
.lb-tier-count { margin-left:auto; font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; flex-shrink:0; }
.lb-row {
  display:flex; align-items:center; gap:0.7rem;
  padding:0.45rem 0.5rem; border-radius:7px; cursor:pointer; transition:background 0.15s;
}
.lb-row:hover { background:rgba(255,255,255,0.05); }
.lb-rank { width:26px; text-align:center; font-size:0.95rem; flex-shrink:0; }
.lb-name-wrap { flex:1; min-width:0; }
.lb-name { font-size:0.85rem; color:var(--mist); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:3px; }
.lb-bar-track { height:3px; background:rgba(255,255,255,0.06); border-radius:2px; }
.lb-bar { height:100%; border-radius:2px; transition:width 0.6s ease; }
.lb-meta { display:flex; flex-direction:column; align-items:flex-end; gap:1px; flex-shrink:0; }
.lb-score { font-size:0.88rem; font-weight:500; }
.lb-insects { font-size:0.68rem; color:var(--sage); }
.lb-note { font-size:0.7rem; color:var(--sage); font-style:italic; margin-top:0.8rem; }

/* ── Donut ── */
.donut-wrap { display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; }
.donut-svg-wrap { position:relative; flex-shrink:0; }
.donut-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }
.donut-center-num { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--mist); line-height:1; }
.donut-center-label { font-size:0.65rem; color:var(--sage); text-transform:uppercase; letter-spacing:0.08em; margin-top:0.15rem; }
.legend { flex:1; min-width:140px; display:flex; flex-direction:column; gap:0.45rem; max-height:240px; overflow-y:auto; }
.legend::-webkit-scrollbar { width:2px; }
.legend::-webkit-scrollbar-thumb { background:rgba(122,170,88,0.3); border-radius:2px; }
.legend-item { display:flex; align-items:center; gap:0.5rem; font-size:0.78rem; color:var(--cream); cursor:pointer; transition:opacity 0.15s; }
.legend-item:hover { opacity:0.7; }
.legend-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.legend-name { flex:1; }
.legend-count { color:var(--sage); font-size:0.72rem; min-width:22px; text-align:right; }
.legend-pct { color:var(--gold); font-size:0.72rem; min-width:30px; text-align:right; }

/* ── Gantt ── */
.gantt-wrap { margin-top:0.5rem; }
.gantt-header { display:flex; align-items:center; margin-bottom:0.4rem; }
.gantt-label-spacer { width:160px; flex-shrink:0; }
.gantt-months { flex:1; display:grid; grid-template-columns:repeat(12,1fr); }
.gantt-month { font-size:0.65rem; color:var(--sage); text-align:center; }
.gantt-body { display:flex; flex-direction:column; gap:5px; }
.gantt-row { display:flex; align-items:center; }
.gantt-label { width:160px; flex-shrink:0; font-size:0.78rem; color:var(--mist); padding-right:10px; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }
.gantt-label:hover { color:var(--cream); text-decoration:underline; }
.gantt-track { flex:1; height:24px; background:rgba(255,255,255,0.03); border-radius:4px; position:relative; border:1px solid rgba(122,170,88,0.06); }
.gantt-bar { position:absolute; top:3px; height:18px; border-radius:3px; display:flex; align-items:center; padding:0 6px; min-width:2px; cursor:pointer; transition:opacity 0.2s; }
.gantt-bar:hover { opacity:0.8; }
.gantt-bar-label { font-size:0.65rem; color:rgba(0,0,0,0.7); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ── Coverage ── */
.coverage-grid { display:grid; grid-template-columns:repeat(12,1fr); gap:5px; height:120px; align-items:end; margin-bottom:0.7rem; }
.coverage-col { display:flex; flex-direction:column; align-items:center; height:100%; }
.coverage-count { font-size:0.65rem; font-weight:500; margin-bottom:3px; height:14px; line-height:14px; }
.coverage-bar-wrap { flex:1; width:100%; display:flex; align-items:flex-end; }
.coverage-bar { width:100%; border-radius:3px 3px 0 0; }
.coverage-month { font-size:0.62rem; margin-top:3px; text-transform:uppercase; letter-spacing:0.03em; }
.coverage-note { font-size:0.78rem; color:var(--sage); padding:0.7rem; background:rgba(255,255,255,0.03); border-radius:8px; border:1px solid var(--border); }

/* ── Plant table (My Plants view) ── */
.plant-table-wrap { overflow-x:auto; }
.plant-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
.plant-table th {
  text-align:left; padding:0.6rem 0.8rem;
  font-size:0.68rem; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--sage); border-bottom:1px solid var(--border);
  white-space:nowrap; font-weight:400;
}
.plant-table td { padding:0.55rem 0.8rem; border-bottom:1px solid rgba(122,170,88,0.06); vertical-align:middle; }
.plant-table tr:hover td { background:rgba(255,255,255,0.03); }
.plant-table tr:last-child td { border-bottom:none; }
.plant-name-cell { color:var(--mist); cursor:pointer; font-weight:400; }
.plant-name-cell:hover { color:var(--cream); text-decoration:underline; }
.sci-name { font-style:italic; font-size:0.75rem; color:var(--sage); }
.priority-badge {
  display:inline-block; font-size:0.65rem; padding:0.15rem 0.5rem;
  border-radius:100px; font-weight:500; white-space:nowrap;
}
.p1 { background:rgba(160,82,45,0.2); color:#e8a070; border:1px solid rgba(160,82,45,0.3); }
.p2 { background:rgba(90,143,168,0.2); color:#90c8e8; border:1px solid rgba(90,143,168,0.3); }
.p3 { background:rgba(122,170,88,0.2); color:#a0d880; border:1px solid rgba(122,170,88,0.3); }
.status-planted { color:var(--sage); font-size:0.78rem; }
.status-wild    { color:var(--gold); font-size:0.78rem; }
.empty-state { text-align:center; padding:3rem; color:var(--sage); font-size:0.9rem; }

/* ── Add plant form ── */
.form-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:1rem; }
.form-group { display:flex; flex-direction:column; gap:0.4rem; }
.form-group.full { grid-column:1/-1; }
.form-label { font-size:0.72rem; color:var(--sage); text-transform:uppercase; letter-spacing:0.06em; }
.form-input, .form-select, .form-textarea {
  background:rgba(255,255,255,0.05); border:1px solid var(--border);
  border-radius:8px; color:var(--cream); font-family:'DM Sans',sans-serif;
  font-size:0.88rem; padding:0.6rem 0.8rem; transition:border-color 0.2s;
  width:100%;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline:none; border-color:var(--sage);
}
.form-select option { background:#1e2d14; color:var(--cream); }
.form-textarea { resize:vertical; min-height:80px; }
.autofill-badge {
  font-size:0.65rem; color:var(--fern); background:rgba(74,122,48,0.15);
  border:1px solid rgba(74,122,48,0.3); border-radius:4px;
  padding:0.1rem 0.4rem; margin-left:0.4rem;
}
.form-section-title {
  font-family:'Playfair Display',serif; font-size:1rem; color:var(--mist);
  padding-bottom:0.5rem; border-bottom:1px solid var(--border);
  margin-bottom:0.8rem; grid-column:1/-1;
}
.quick-add-banner {
  background:rgba(74,122,48,0.1); border:1px solid rgba(74,122,48,0.25);
  border-radius:10px; padding:0.8rem 1.1rem; margin-bottom:1.5rem;
  font-size:0.82rem; color:var(--sage);
  display:flex; align-items:center; gap:0.6rem;
}

/* ── Modal ── */
#modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:1000;
}
#modal-overlay.open { display:block; }
#plant-modal {
  display:none; position:fixed;
  top:50%; left:50%; transform:translate(-50%,-50%);
  width:min(620px,92vw); max-height:85vh;
  background:#162010; border:1px solid rgba(122,170,88,0.25);
  border-radius:18px; z-index:1001; overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,0.7);
}
#plant-modal.open { display:block; }
#plant-modal::-webkit-scrollbar { width:3px; }
#plant-modal::-webkit-scrollbar-thumb { background:rgba(122,170,88,0.3); border-radius:3px; }
.modal-inner { padding:2rem; }
.modal-header { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; margin-bottom:1rem; }
.modal-plant-name { font-family:'Playfair Display',serif; font-size:1.6rem; color:var(--mist); font-weight:700; }
.modal-sci-name { font-size:0.82rem; color:var(--sage); font-style:italic; margin-top:0.2rem; }
.modal-close {
  background:rgba(255,255,255,0.06); border:1px solid var(--border);
  color:var(--sage); font-size:1rem; width:30px; height:30px;
  border-radius:50%; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s;
}
.modal-close:hover { background:rgba(255,255,255,0.12); color:var(--mist); }
.modal-tier-badge {
  display:inline-block; border:1px solid; border-radius:100px;
  padding:0.25rem 0.8rem; font-size:0.75rem; font-weight:500; margin-bottom:1.2rem;
}
.modal-section-title {
  font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--sage); margin:1.1rem 0 0.6rem;
  padding-bottom:0.35rem; border-bottom:1px solid var(--border);
}
.modal-stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:0.5rem; }
.modal-stat { background:rgba(255,255,255,0.03); border-radius:7px; padding:0.5rem 0.65rem; border:1px solid var(--border); }
.modal-stat-label { font-size:0.65rem; color:var(--sage); margin-bottom:0.15rem; }
.modal-stat-value { font-size:0.82rem; color:var(--mist); }
.modal-eco-block { background:rgba(255,255,255,0.03); border-radius:7px; padding:0.6rem 0.8rem; border:1px solid var(--border); margin-bottom:0.5rem; }
.modal-eco-label { font-size:0.68rem; color:var(--sage); margin-bottom:0.3rem; }
.modal-eco-text { font-size:0.85rem; color:var(--cream); line-height:1.5; }
.modal-notes { font-size:0.85rem; color:var(--cream); line-height:1.6; background:rgba(255,255,255,0.03); border-radius:7px; padding:0.7rem 0.85rem; border:1px solid var(--border); }
.modal-edit-btn { margin-top:1.2rem; width:100%; }

/* ── Drawer ── */
#plant-drawer {
  position:fixed; top:0; right:-360px; width:340px; height:100vh;
  background:#162010; border-left:1px solid var(--border);
  z-index:900; transition:right 0.3s ease;
  display:flex; flex-direction:column; box-shadow:-8px 0 32px rgba(0,0,0,0.5);
}
#plant-drawer.open { right:0; }
.drawer-header { display:flex; align-items:center; justify-content:space-between; padding:1.4rem 1.4rem 0.8rem; border-bottom:1px solid var(--border); flex-shrink:0; }
.drawer-title { font-family:'Playfair Display',serif; font-size:1.05rem; color:var(--mist); }
.drawer-close { background:none; border:none; color:var(--sage); font-size:1rem; cursor:pointer; padding:0.2rem; transition:color 0.2s; }
.drawer-close:hover { color:var(--mist); }
.drawer-count { padding:0.5rem 1.4rem; font-size:0.72rem; color:var(--sage); letter-spacing:0.06em; text-transform:uppercase; flex-shrink:0; }
.drawer-list { flex:1; overflow-y:auto; padding:0.5rem 1.4rem 1.4rem; }
.drawer-list::-webkit-scrollbar { width:2px; }
.drawer-list::-webkit-scrollbar-thumb { background:rgba(122,170,88,0.3); border-radius:2px; }
.drawer-item { padding:0.5rem 0; font-size:0.85rem; color:var(--cream); border-bottom:1px solid rgba(122,170,88,0.06); display:flex; align-items:center; justify-content:space-between; cursor:pointer; border-radius:5px; transition:background 0.15s; padding:0.5rem 0.4rem; margin:0 -0.4rem; }
.drawer-item:hover { background:rgba(122,170,88,0.08); }
.drawer-item:last-child { border-bottom:none; }
.drawer-arrow { color:var(--sage); font-size:0.75rem; flex-shrink:0; }

/* ── Toast ── */
#toast {
  position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px);
  background:#1e3a14; border:1px solid rgba(122,170,88,0.3);
  border-radius:100px; padding:0.6rem 1.4rem;
  font-size:0.85rem; color:var(--mist);
  transition:transform 0.3s ease; z-index:2000;
  white-space:nowrap;
}
#toast.show { transform:translateX(-50%) translateY(0); }

/* ── No data ── */
.no-data { color:var(--sage); font-style:italic; font-size:0.85rem; padding:1rem 0; }

/* ── Mobile ── */
@media(max-width:700px) {
  #app { flex-direction:column; height:auto; }
  #sidebar { width:100%; height:auto; border-right:none; border-bottom:1px solid var(--border); }
  .sidebar-nav { display:flex; flex-direction:row; overflow-x:auto; padding:0.5rem 0; }
  .nav-section { display:none; }
  .nav-item { padding:0.5rem 1rem; border-left:none; border-bottom:2px solid transparent; white-space:nowrap; }
  .nav-item.active { border-left-color:transparent; border-bottom-color:var(--sage); }
  .sidebar-stats,.sync-status { display:none; }
  #main { height:auto; }
  #main-header { padding:1rem 1.2rem; flex-wrap:wrap; gap:0.7rem; }
  #page-content { padding:1.2rem; }
  .dash-grid { grid-template-columns:1fr; }
  .card.wide { grid-column:1; }
  .form-grid { grid-template-columns:1fr; }
}

  /* ── Custom autocomplete ── */
  .autocomplete-wrap { position:relative; }
  .autocomplete-input { width:100%; }
  .autocomplete-dropdown {
    position:absolute; top:calc(100% + 4px); left:0; right:0;
    background:#1a2e14; border:1px solid rgba(122,170,88,0.3);
    border-radius:10px; z-index:500; max-height:220px; overflow-y:auto;
    box-shadow:0 8px 32px rgba(0,0,0,0.5); display:none;
  }
  .autocomplete-dropdown.open { display:block; }
  .autocomplete-dropdown::-webkit-scrollbar { width:3px; }
  .autocomplete-dropdown::-webkit-scrollbar-thumb { background:rgba(122,170,88,0.3); border-radius:3px; }
  .autocomplete-item {
    padding:0.55rem 0.9rem; font-size:0.85rem; color:var(--mist);
    cursor:pointer; border-bottom:1px solid rgba(122,170,88,0.06);
    transition:background 0.1s;
  }
  .autocomplete-item:last-child { border-bottom:none; }
  .autocomplete-item:hover, .autocomplete-item.highlighted { background:rgba(122,170,88,0.12); color:var(--cream); }
  .autocomplete-item em { color:var(--sage); font-style:normal; font-size:0.75rem; margin-left:0.4rem; }

</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ── Config ────────────────────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-oxDxHMwKx-3SBucx5n5xoTmHhhsQHgW_aHDrorNAXEvBsDcvJYdsNMJh5aHe62Tx8g/exec';
const SHEET_HEADERS = ['Common Name','Scientific Name','Family','Growth Habit','Duration',
  'Priority','Sun Requirement','Moisture Level','Ecological Benefits',
  'Specific Wildlife/Insects','Bloom Time','Location in Yard','Status','Notes'];

// ── Priority reference data (loaded from sheets) ──────────────────────────
let refData  = {}; // { commonName: { sci, family, growth, duration, priority } }
let plantRows = []; // rows from Plant Inventory sheet (arrays)
let actualHeaders = []; // real column headers from the sheet
let currentPage = 'dashboard';

// ── Keyword groups ────────────────────────────────────────────────────────
const PALETTE = ['#7aaa58','#c4973a','#5a8fa8','#8b3a1e','#4a7a30','#c8806a',
                 '#5a8a7a','#a87a4a','#7a8ab0','#9e6a7a','#5a9e7a','#d4876a'];
const WILDLIFE_GROUPS = [
  {label:'Bees',        keywords:['bee','bumblebee','mining bee','honeybee']},
  {label:'Monarchs',    keywords:['monarch']},
  {label:'Butterflies', keywords:['butterfly','butterflies','swallowtail','fritillary','painted lady','skipper','hairstreak','crescent','azure','admiral']},
  {label:'Moths',       keywords:['moth','sphinx','clearwing','luna','underwing']},
  {label:'Hummingbirds',keywords:['hummingbird']},
  {label:'Birds',       keywords:['bird','finch','sparrow','goldfinch','chickadee','wren','turkey','grouse']},
  {label:'Beetles',     keywords:['beetle']},
  {label:'Mammals',     keywords:['rabbit','deer','raccoon','squirrel','turtle','chipmunk']},
];
const ECO_GROUPS = [
  {label:'Host Plant',       keywords:['host plant','larval host','host']},
  {label:'Pollinator Nectar',keywords:['nectar','pollinator']},
  {label:'Bird Forage',      keywords:['bird forage','seed','berry','fruit']},
  {label:'Ground Cover',     keywords:['ground cover','groundcover']},
  {label:'Soil Health',      keywords:['soil','nitrogen','erosion']},
  {label:'Riparian',         keywords:['riparian','wetland','rain garden']},
  {label:'Medicinal',        keywords:['medicinal']},
  {label:'Spring Ephemeral', keywords:['ephemeral']},
];
const MOISTURE_GROUPS = [
  {label:'Dry',        keywords:['dry','drought','xeric']},
  {label:'Dry-Medium', keywords:['dry to medium','dry-medium']},
  {label:'Medium',     keywords:['medium','mesic','moderate','moist']},
  {label:'Medium-Wet', keywords:['medium to wet','medium-wet','moist to wet']},
  {label:'Wet',        keywords:['wet','saturated','bog','marsh']},
];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_IDX = {january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11,jan:0,feb:1,mar:2,apr:3,jun:5,jul:6,aug:7,sep:8,sept:8,oct:9,nov:10,dec:11};

// ── Scoring ───────────────────────────────────────────────────────────────
const LEPI_KW = ['moth','butterfly','larval host','host plant','swallowtail','fritillary','monarch','skipper','hairstreak','azure','crescent','admiral','sulfur','painted lady','sphinx','clearwing','luna','underwing'];
const KEYSTONE_RX = /over\s+(\d+)\s+species/i;
const SPECIALIST_RX = /specialist|specialized/i;
const FOUNDATION_RX = /foundation|pioneer|soil.?stabiliz/i;
const H = SHEET_HEADERS;

function col(row, name) {
  // Use actual headers from sheet if available, fall back to hardcoded
  const headers = actualHeaders.length ? actualHeaders : H;
  const i = headers.findIndex(h => String(h).trim() === name);
  return i >= 0 ? String(row[i] || '').trim() : '';
}

function calcScore(row) {
  const w = col(row,'Specific Wildlife/Insects').toLowerCase();
  const e = col(row,'Ecological Benefits').toLowerCase();
  const n = col(row,'Notes').toLowerCase();
  const all = w+' '+e+' '+n;
  let score = 10;
  score += LEPI_KW.filter(kw=>w.includes(kw)).length * 5;
  const km = all.match(KEYSTONE_RX);
  if (km && parseInt(km[1])>=400) score += 100;
  if (FOUNDATION_RX.test(all)) score += 20;
  if (SPECIALIST_RX.test(all)) score = Math.round(score*1.5);
  return score;
}

function classifyTier(row) {
  const w=col(row,'Specific Wildlife/Insects').toLowerCase();
  const e=col(row,'Ecological Benefits').toLowerCase();
  const n=col(row,'Notes').toLowerCase();
  const all=w+' '+e+' '+n;
  const km=all.match(KEYSTONE_RX);
  if(km&&parseInt(km[1])>=400) return 'keystone';
  if(SPECIALIST_RX.test(all)) return 'specialist';
  const g=col(row,'Growth Habit').toLowerCase();
  if(/sedge|grass|graminoid|fern|ground.?cover/.test(g+' '+all)&&LEPI_KW.some(kw=>w.includes(kw))) return 'foundation';
  if(FOUNDATION_RX.test(all)) return 'foundation';
  return 'general';
}

function insectCount(row) {
  const w = col(row,'Specific Wildlife/Insects');
  if (!w.trim()) return 0;
  return w.split(/[,;]|\band\b/).map(s=>s.trim()).filter(Boolean).length;
}

// ── Data loading ───────────────────────────────────────────────────────────
async function loadAll() {
  setSyncState('syncing','Loading...');
  try {
    const [inv, p1, p2, p3] = await Promise.all([
      fetchSheet('Plant Inventory'),
      fetchSheet('Priority 1 – Putnam County'),
      fetchSheet('Priority 2 – Hudson Valley'),
      fetchSheet('Priority 3 – NY State'),
    ]);

    console.log('inv type:', typeof inv, Array.isArray(inv) ? inv.length+' rows' : inv);
    console.log('p1 type:', typeof p1, Array.isArray(p1) ? p1.length+' rows' : p1);
    console.log('p2 type:', typeof p2, Array.isArray(p2) ? p2.length+' rows' : p2);
    console.log('p3 type:', typeof p3, Array.isArray(p3) ? p3.length+' rows' : p3);

    // Build reference lookup from priority sheets
    refData = {}; actualHeaders = [];
    const buildRef = (rows, priority) => {
      if (!rows || !Array.isArray(rows) || rows.length < 2) {
        console.warn('buildRef skipped for', priority, '— got:', typeof rows, Array.isArray(rows) ? rows.length + ' rows' : rows);
        return;
      }
      // Find the actual header row (first row with 'Common Name' in it)
      let hdrIdx = 0;
      for (let i = 0; i < Math.min(5, rows.length); i++) {
        if (Array.isArray(rows[i]) && rows[i].some(c => String(c).toLowerCase().includes('common'))) {
          hdrIdx = i; break;
        }
      }
      const hdr = rows[hdrIdx];
      if (!Array.isArray(hdr)) { console.warn('Header row not an array:', hdr); return; }
      const ci = n => hdr.findIndex(h => String(h).toLowerCase().includes(n.toLowerCase()));
      const commonI=ci('Common'), sciI=ci('Scientific'), famI=ci('Family'),
            growI=ci('Growth'), durI=ci('Duration'), habI=ci('Habitat');
      console.log(`buildRef ${priority}: ${rows.length-1} rows, commonI=${commonI}, sciI=${sciI}`);
      for (let i=hdrIdx+1;i<rows.length;i++) {
        const r=rows[i];
        if (!Array.isArray(r)) continue;
        const name=String(r[commonI]||'').trim();
        if (!name) continue;
        if (!refData[name.toLowerCase()]) {
          refData[name.toLowerCase()]={
            commonName: name,
            scientific: String(r[sciI]||'').trim(),
            family:     String(r[famI]||'').trim(),
            growth:     String(r[growI]||'').trim(),
            duration:   String(r[durI]||'').trim(),
            habitat:    habI>=0?String(r[habI]||'').trim():'',
            priority,
          };
        }
      }
      console.log(`buildRef ${priority}: loaded ${Object.keys(refData).length} total entries`);
    };
    buildRef(p1,'P1 – Putnam County');
    buildRef(p2,'P2 – Hudson Valley');
    buildRef(p3,'P3 – NY State');

    // Parse inventory rows — find real header by looking for 'Common Name'
    if (inv && inv.length > 1) {
      let headerRow = 0;
      for (let i=0;i<Math.min(8,inv.length);i++) {
        if (Array.isArray(inv[i]) && inv[i].some(c=>String(c).trim()==='Common Name')) {
          headerRow=i; break;
        }
      }
      console.log('Inventory header row index:', headerRow, '— headers:', inv[headerRow]);
      actualHeaders = inv[headerRow].map(h => String(h).trim());
      plantRows = inv.slice(headerRow+1)
        .filter(r=>r.some(c=>String(c).trim()))
        .map(r=>{
          while(r.length<H.length) r.push('');
          return r;
        });
      console.log('plantRows loaded:', plantRows.length, '— first row:', plantRows[0]);
    }

    updateSidebarStats();
    setSyncState('ok', 'Synced with Google Sheets');
    renderCurrentPage();
  } catch(e) {
    console.error('loadAll error:', e);
    setSyncState('error', 'Connection error');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('page-content').innerHTML = `
      <div class="card wide" style="margin-top:2rem;">
        <div class="card-title" style="color:var(--rust)">⚠️ Could not connect to Google Sheets</div>
        <div class="card-sub">Open browser console (F12) to see the full error</div>
        <p style="color:var(--sage);font-size:0.85rem;margin-top:1rem;line-height:1.6;">
          <strong>Error:</strong> ${e.message}<br><br>
          Common fixes:<br>
          1. In Apps Script → Deploy → Manage deployments → Edit → bump to <strong>New version</strong> → Deploy<br>
          2. Make sure "Who has access" is set to <strong>Anyone</strong><br>
          3. Open this URL directly in your browser to test it:<br>
          <a href="${APPS_SCRIPT_URL}?sheet=Plant+Inventory" target="_blank" style="color:var(--sage);word-break:break-all;">${APPS_SCRIPT_URL}?sheet=Plant+Inventory</a>
        </p>
      </div>`;
  }
}

async function fetchSheet(sheetName) {
  const url = `${APPS_SCRIPT_URL}?sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url, { method:'GET', redirect:'follow' });
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch(e) {
    console.error('Failed to parse sheet:', sheetName, text.slice(0,200));
    return [];
  }
}

async function addRow(rowData) {
  setSyncState('syncing','Saving...');
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action:'addRow', row:rowData })
    });
    plantRows.push(rowData);
    updateSidebarStats();
    setSyncState('ok','Saved!');
    showToast('Plant added — reopen to confirm sync ✓');
    setTimeout(()=>setSyncState('ok','Synced with Google Sheets'),2000);
  } catch(err) {
    console.error('addRow error:', err);
    showToast('Could not save — check connection');
    setSyncState('error','Save error');
  }
}

async function updateRow(plantName, updatedRow) {
  setSyncState('syncing','Saving...');
  // Find the row index in plantRows (0-based in our array)
  const idx = plantRows.findIndex(r => col(r,'Common Name').toLowerCase() === plantName.toLowerCase());
  if (idx === -1) { showToast('Could not find plant to update'); return; }

  // The actual sheet row = header rows offset + idx
  // Header is at row index 2 in the sheet (0-based), data starts at 3
  // Apps Script rowIndex is 1-based sheet row
  const sheetRowIndex = idx + 4; // 1 title + 1 legend + 1 header + 1 for 1-based = +4

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action:'updateRow', rowIndex: sheetRowIndex, values: updatedRow })
    });
    plantRows[idx] = updatedRow;
    updateSidebarStats();
    setSyncState('ok','Saved!');
    showToast('Plant updated — reopen to confirm sync ✓');
    setTimeout(()=>setSyncState('ok','Synced with Google Sheets'),2000);
  } catch(err) {
    console.error('updateRow error:', err);
    showToast('Could not update — check connection');
    setSyncState('error','Save error');
  }
}

async function deleteRow(plantName) {
  setSyncState('syncing','Deleting...');
  const idx = plantRows.findIndex(r => col(r,'Common Name').toLowerCase() === plantName.toLowerCase());
  if (idx === -1) { showToast('Could not find plant to delete'); return; }
  const sheetRowIndex = idx + 4;

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action:'deleteRow', rowIndex: sheetRowIndex })
    });
    plantRows.splice(idx, 1);
    updateSidebarStats();
    setSyncState('ok','Deleted');
    showToast('Plant removed — reopen to confirm sync ✓');
    setTimeout(()=>setSyncState('ok','Synced with Google Sheets'),2000);
  } catch(err) {
    console.error('deleteRow error:', err);
    showToast('Could not delete — check connection');
    setSyncState('error','Delete error');
  }
}

// ── UI State ───────────────────────────────────────────────────────────────
function setSyncState(state, text) {
  const dot  = document.getElementById('sync-dot');
  const span = document.getElementById('sync-text');
  dot.className  = 'sync-dot' + (state==='syncing'?' syncing':state==='error'?' error':'');
  span.textContent = text;
}

function updateSidebarStats() {
  document.getElementById('stat-total').textContent = plantRows.length;
  const count = p => plantRows.filter(r=>col(r,'Priority').includes(p)).length;
  document.getElementById('stat-p1').textContent = count('P1');
  document.getElementById('stat-p2').textContent = count('P2');
  document.getElementById('stat-p3').textContent = count('P3');
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+page)?.classList.add('active');
  const titles = {
    dashboard:['Dashboard','Your garden\'s ecological impact at a glance'],
    plants:   ['My Plants','Your complete plant collection'],
    add:      ['Add Plant','Full plant entry with auto-fill from priority lists'],
    quickadd: ['Quick Add','Field mode — add a plant in seconds'],
  };
  const [title,sub] = titles[page]||['',''];
  document.getElementById('page-title').textContent    = title;
  document.getElementById('page-subtitle').textContent = sub;
  renderCurrentPage();
}

function renderCurrentPage() {
  const loading = document.getElementById('loading');
  if (loading) loading.style.display = 'none';
  const content = document.getElementById('page-content');
  content.innerHTML = '';
  if (currentPage==='dashboard') renderDashboard(content);
  else if (currentPage==='plants')   renderPlantsTable(content);
  else if (currentPage==='add')      renderAddForm(content, false);
  else if (currentPage==='quickadd') renderAddForm(content, true);
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function renderDashboard(container) {
  if (!plantRows.length) {
    container.innerHTML='<div class="empty-state">No plants yet — <a href="#" onclick="showPage(\'add\')" style="color:var(--sage)">add your first plant</a></div>';
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'dash-grid';
  grid.appendChild(makeLeaderboard());
  const wildData = countGroups('Specific Wildlife/Insects', WILDLIFE_GROUPS);
  if (wildData.length) grid.appendChild(makeDonut('Wildlife & Insects','Click a slice to see which plants support each group',wildData,true,lbl=>{
    const g=WILDLIFE_GROUPS.find(x=>x.label===lbl);
    if(!g) return;
    openDrawer('🦋 '+lbl, plantRows.filter(r=>g.keywords.some(kw=>col(r,'Specific Wildlife/Insects').toLowerCase().includes(kw))).map(r=>col(r,'Common Name')).filter(Boolean));
  }));
  const ecoData = countGroups('Ecological Benefits', ECO_GROUPS);
  if (ecoData.length) grid.appendChild(makeDonut('Ecological Benefits','Click a slice to see which plants match',ecoData,true,lbl=>{
    const g=ECO_GROUPS.find(x=>x.label===lbl);
    if(!g) return;
    openDrawer('🌱 '+lbl, plantRows.filter(r=>g.keywords.some(kw=>col(r,'Ecological Benefits').toLowerCase().includes(kw))).map(r=>col(r,'Common Name')).filter(Boolean));
  }));
  const sunData = countSimple('Sun Requirement');
  if (sunData.length) grid.appendChild(makeDonut('Sun Requirements','Click a slice to see which plants match',sunData,false,lbl=>openDrawerSimple('☀️ '+lbl,'Sun Requirement',lbl)));
  const moistData = countGroups('Moisture Level', MOISTURE_GROUPS);
  if (moistData.length) grid.appendChild(makeDonut('Moisture Levels','Click a slice to see which plants match',moistData,true,lbl=>{
    const g=MOISTURE_GROUPS.find(x=>x.label===lbl);
    if(!g) return;
    openDrawer('💧 '+lbl, plantRows.filter(r=>g.keywords.some(kw=>col(r,'Moisture Level').toLowerCase().includes(kw))).map(r=>col(r,'Common Name')).filter(Boolean));
  }));
  const stData = countSimple('Status');
  if (stData.length) grid.appendChild(makeDonut('Planted vs Found/Wild','Click a slice to see which plants match',stData,false,lbl=>openDrawerSimple('🏷️ '+lbl,'Status',lbl)));
  const bloomPlants = getBloomData();
  if (bloomPlants.length) {
    grid.appendChild(makeGantt(bloomPlants));
    grid.appendChild(makeCoverage(bloomPlants));
  }
  container.appendChild(grid);
}

// ── Plants table ───────────────────────────────────────────────────────────
function renderPlantsTable(container) {
  if (!plantRows.length) {
    container.innerHTML='<div class="empty-state">No plants yet.</div>'; return;
  }
  const card = document.createElement('div');
  card.className = 'card wide';
  const wrap = document.createElement('div');
  wrap.className = 'plant-table-wrap';
  const table = document.createElement('table');
  table.className = 'plant-table';

  // Incomplete plants banner — append first so it sits above the table
  const incompletePlants = plantRows.filter(isIncomplete);
  if (incompletePlants.length) {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:rgba(196,151,58,0.12);border:1px solid rgba(196,151,58,0.3);border-radius:10px;padding:0.8rem 1.1rem;margin-bottom:1.2rem;font-size:0.82rem;color:#c4973a;display:flex;align-items:center;gap:0.6rem;';
    banner.innerHTML = `⚠️ <strong>${incompletePlants.length} plant${incompletePlants.length!==1?'s':''}</strong> need${incompletePlants.length===1?'s':''} more information — look for the <strong>⚠</strong> icon below`;
    card.appendChild(banner);
  }

  table.innerHTML = `<thead><tr>
    <th></th><th>Common Name</th><th>Priority</th>
    <th>Sun</th><th>Bloom Time</th><th>Status</th>
  </tr></thead>`;
  const tbody = document.createElement('tbody');
  [...plantRows].sort((a,b)=>col(a,'Common Name').localeCompare(col(b,'Common Name'))).forEach(row=>{
    const name=col(row,'Common Name'), sci=col(row,'Scientific Name'),
          pri=col(row,'Priority'), sun=col(row,'Sun Requirement'),
          bloom=col(row,'Bloom Time'), status=col(row,'Status');
    const priNum = pri.includes('P1')?1:pri.includes('P2')?2:3;
    const incomplete = isIncomplete(row);
    const missing = incomplete ? missingFields(row) : [];
    const tr = document.createElement('tr');
    if (incomplete) tr.style.background = 'rgba(196,151,58,0.05)';
    tr.innerHTML = `
      <td style="text-align:center;width:24px;padding:0 4px;">
        ${incomplete
          ? `<span style="color:#c4973a;font-size:1rem;" title="Missing: ${missing.join(', ')}">⚠</span>`
          : `<span style="color:var(--sage);font-size:0.72rem;">✓</span>`}
      </td>
      <td><div class="plant-name-cell" onclick="openPlantModal('${name.replace(/'/g,"\\'")}')">🌿 ${name}</div>
          <div class="sci-name">${sci}</div></td>
      <td><span class="priority-badge p${priNum}">${pri||'—'}</span></td>
      <td>${sun||'—'}</td>
      <td>${bloom||'—'}</td>
      <td><span class="${status==='Planted'?'status-planted':'status-wild'}">${status||'—'}</span></td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

// ── Custom autocomplete ───────────────────────────────────────────────────
function makeAutocomplete(inputId, dropdownId, onSelect) {
  const input    = document.getElementById(inputId);
  const dropdown = document.getElementById(dropdownId);
  if (!input || !dropdown) return;

  let highlighted = -1;

  function showSuggestions(val) {
    const q = val.trim().toLowerCase();
    if (!q) { dropdown.classList.remove('open'); return; }
    // Read refData live every time so it works even if called before data loads
    const allNames = Object.values(refData).map(p => p.commonName).sort();
    const matches = allNames.filter(n => n.toLowerCase().includes(q)).slice(0, 40);
    if (!matches.length) {
      dropdown.innerHTML = '<div class="autocomplete-empty">No matches found</div>';
    } else {
      dropdown.innerHTML = matches.map((name, i) => {
        const idx = name.toLowerCase().indexOf(q);
        const highlighted_name = name.slice(0,idx) + '<strong>' + name.slice(idx,idx+q.length) + '</strong>' + name.slice(idx+q.length);
        const ref = refData[name.toLowerCase()];
        const sci = ref ? `<em>${ref.scientific}</em>` : '';
        return `<div class="autocomplete-item" data-name="${name}" data-idx="${i}">${highlighted_name} ${sci}</div>`;
      }).join('');
      dropdown.querySelectorAll('.autocomplete-item').forEach(el => {
        el.addEventListener('mousedown', e => {
          e.preventDefault();
          input.value = el.dataset.name;
          dropdown.classList.remove('open');
          onSelect(el.dataset.name);
        });
      });
    }
    highlighted = -1;
    dropdown.classList.add('open');
  }

  input.addEventListener('input', () => showSuggestions(input.value));
  input.addEventListener('focus', () => { if (input.value.trim()) showSuggestions(input.value); });
  input.addEventListener('blur',  () => setTimeout(() => dropdown.classList.remove('open'), 150));
  input.addEventListener('keydown', e => {
    const items = dropdown.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault(); highlighted = Math.min(highlighted+1, items.length-1);
      items.forEach((el,i) => el.classList.toggle('highlighted', i===highlighted));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault(); highlighted = Math.max(highlighted-1, -1);
      items.forEach((el,i) => el.classList.toggle('highlighted', i===highlighted));
    } else if (e.key === 'Enter' && highlighted >= 0) {
      e.preventDefault();
      const chosen = items[highlighted]?.dataset?.name;
      if (chosen) { input.value = chosen; dropdown.classList.remove('open'); onSelect(chosen); }
    } else if (e.key === 'Escape') {
      dropdown.classList.remove('open');
    }
  });
}

function getSunOptions(selected='') {
  // Pull unique values from actual data, plus always include the standard three
  const standard = ['Full Sun','Part Shade','Full Shade'];
  const fromData  = [...new Set(plantRows.map(r=>col(r,'Sun Requirement')).filter(Boolean))];
  const all = [...new Set([...standard, ...fromData])].sort();
  return ['<option value="">Select...</option>',
    ...all.map(o=>`<option ${selected===o?'selected':''}>${o}</option>`)
  ].join('');
}

// ── Charts ─────────────────────────────────────────────────────────────────
function countGroups(colName, groups) {
  const counts = {};
  for (const g of groups) counts[g.label]=0;
  for (const row of plantRows) {
    const val = col(row,colName).toLowerCase();
    if (!val) continue;
    for (const g of groups) if (g.keywords.some(kw=>val.includes(kw))) counts[g.label]++;
  }
  return Object.entries(counts).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([label,count])=>({label,count}));
}

// ── Incomplete plant detection ────────────────────────────────────────────
const REQUIRED_COLS = ['Sun Requirement','Moisture Level','Ecological Benefits',
                        'Specific Wildlife/Insects','Bloom Time','Status'];

function isIncomplete(row) {
  return REQUIRED_COLS.some(c => !col(row, c).trim());
}

function missingFields(row) {
  return REQUIRED_COLS.filter(c => !col(row, c).trim());
}

function countSimple(colName) {
  const counts={};
  for (const row of plantRows) {
    const val=col(row,colName).trim();
    if(!val) continue;
    counts[val]=(counts[val]||0)+1;
  }
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([label,count])=>({label,count}));
}

function makeDonut(title, subtitle, data, useActualTotal, onClick) {
  const card=document.createElement('div'); card.className='card';
  const total=plantRows.length;
  const dataTotal=data.reduce((s,d)=>s+d.count,0);
  const center=useActualTotal?total:dataTotal;
  const SIZE=180,cx=90,cy=90,R=72,r=44;
  let angle=-Math.PI/2, paths='';
  data.forEach((d,i)=>{
    const slice=(d.count/dataTotal)*2*Math.PI, end=angle+slice;
    const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    const x2=cx+R*Math.cos(end),y2=cy+R*Math.sin(end);
    const ix1=cx+r*Math.cos(angle),iy1=cy+r*Math.sin(angle);
    const ix2=cx+r*Math.cos(end),iy2=cy+r*Math.sin(end);
    const lg=slice>Math.PI?1:0, color=PALETTE[i%PALETTE.length];
    paths+=`<path data-label="${d.label}" d="M${ix1},${iy1} L${x1},${y1} A${R},${R} 0 ${lg},1 ${x2},${y2} L${ix2},${iy2} A${r},${r} 0 ${lg},0 ${ix1},${iy1} Z" fill="${color}" opacity="0.88" style="cursor:pointer;transition:all 0.18s;"><title>${d.label}: ${d.count} of ${total}</title></path>`;
    angle=end;
  });
  const legend=data.map((d,i)=>`<div class="legend-item" data-legend="${d.label}"><div class="legend-dot" style="background:${PALETTE[i%PALETTE.length]}"></div><span class="legend-name">${d.label}</span><span class="legend-count">${d.count}</span><span class="legend-pct">${Math.round(d.count/center*100)}%</span></div>`).join('');
  card.innerHTML=`<div class="card-title">${title}</div><div class="card-sub">${subtitle}</div>
    <div class="donut-wrap">
      <div class="donut-svg-wrap">
        <svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}">${paths}</svg>
        <div class="donut-center"><div class="donut-center-num">${center}</div><div class="donut-center-label">plants</div></div>
      </div>
      <div class="legend">${legend}</div>
    </div>`;
  const svg=card.querySelector('svg');
  svg.addEventListener('click',e=>{const lbl=e.target.closest('path')?.dataset?.label;if(lbl)onClick(lbl);});
  svg.addEventListener('mouseover',e=>{const p=e.target.closest('path');if(p){p.style.opacity='1';p.style.transform=`scale(1.04)`;p.style.transformOrigin=`${cx}px ${cy}px`;}});
  svg.addEventListener('mouseout',e=>{const p=e.target.closest('path');if(p){p.style.opacity='0.88';p.style.transform='scale(1)';}});
  card.querySelectorAll('[data-legend]').forEach(el=>el.addEventListener('click',()=>onClick(el.dataset.legend)));
  return card;
}

function parseBloomRange(val) {
  const str=val.toLowerCase().replace(/[-\u2013\u2014]/g,' to ');
  const found=[];
  for(const[name,idx]of Object.entries(MONTH_IDX)){if(new RegExp('\\b'+name+'\\b').test(str))found.push(idx);}
  if(!found.length)return null;
  return{start:Math.min(...found),end:Math.max(...found)};
}

function getBloomData() {
  return plantRows.map(row=>{
    const bloom=col(row,'Bloom Time'), name=col(row,'Common Name');
    if(!bloom||!name)return null;
    const range=parseBloomRange(bloom);
    if(!range)return null;
    return{name,bloom,start:range.start,end:range.end};
  }).filter(Boolean).sort((a,b)=>a.start-b.start||a.end-b.end);
}

function makeGantt(plants) {

function makeCoverage(plants) {
  const card=document.createElement('div'); card.className='card wide';
  const mc=new Array(12).fill(0), mp=Array.from({length:12},()=>[]);
  for(const p of plants){for(let m=p.start;m<=p.end;m++){mc[m]++;mp[m].push(p.name);}}
  const max=Math.max(...mc,1), covered=mc.filter(c=>c>0).length;
  const gaps=MONTHS.filter((_,i)=>mc[i]===0), peak=MONTHS[mc.indexOf(max)];
  const bars=MONTHS.map((m,i)=>{
    const c=mc[i], pct=Math.round((c/max)*100);
    const color=c===0?'rgba(255,255,255,0.05)':c===max?'#c4973a':'#4a7a30';
    return `<div class="coverage-col" title="${c===0?'No blooms':mp[i].join(', ')}">
      <div class="coverage-count" style="color:${c===0?'rgba(200,221,184,0.25)':c===max?'#c4973a':'var(--sage)'}">${c||''}</div>
      <div class="coverage-bar-wrap"><div class="coverage-bar" style="height:${Math.max(pct,c>0?8:0)}%;background:${color};"></div></div>
      <div class="coverage-month" style="color:${c===0?'rgba(200,221,184,0.25)':'var(--sage)'}">${m}</div></div>`;
  }).join('');
  card.innerHTML=`<div class="card-title">Bloom Coverage</div><div class="card-sub">${covered}/12 months covered · Peak: ${peak} (${max} plants)</div>
    <div class="coverage-grid">${bars}</div>
    <div class="coverage-note">${gaps.length===0?'🎉 You have blooms every month!':`Gaps: <strong style="color:var(--rust)">${gaps.join(', ')}</strong> — consider plants to fill these months`}</div>`;
  return card;
}

  modal.innerHTML=`<div class="modal-inner">
    <div class="modal-header">
      <div><div class="modal-plant-name">${name}</div>${sci?`<div class="modal-sci-name">${sci}</div>`:''}</div>
      <button class="modal-close" onclick="closePlantModal()">✕</button>
    </div>
    <div class="modal-tier-badge" style="background:${tierColors[tier]}22;border-color:${tierColors[tier]}55;color:${tierColors[tier]}">${tierLabels[tier]} · Score: ${score}</div>
    ${isIncomplete(row)?`<div style="background:rgba(196,151,58,0.1);border:1px solid rgba(196,151,58,0.3);border-radius:8px;padding:0.5rem 0.8rem;margin-bottom:0.8rem;font-size:0.78rem;color:#c4973a;">⚠️ Missing: ${missingFields(row).join(', ')}</div>`:''}
    <div class="modal-section-title">Quick Stats</div>
    <div class="modal-stats-grid">
      ${stat('☀️ Sun',col(row,'Sun Requirement'))}${stat('💧 Moisture',col(row,'Moisture Level'))}
      ${stat('🌿 Growth',col(row,'Growth Habit'))}${stat('📅 Bloom',col(row,'Bloom Time'))}
      ${stat('⏳ Duration',col(row,'Duration'))}${stat('📍 Location',col(row,'Location in Yard'))}
      ${stat('🏷️ Status',col(row,'Status'))}${stat('🌍 Priority',col(row,'Priority'))}
      ${stat('🌿 Family',col(row,'Family'))}
    </div>
    ${col(row,'Specific Wildlife/Insects')||col(row,'Ecological Benefits')?`
    <div class="modal-section-title">Ecological Role</div>
    ${col(row,'Specific Wildlife/Insects')?`<div class="modal-eco-block"><div class="modal-eco-label">🦋 Wildlife & Insects</div><div class="modal-eco-text">${col(row,'Specific Wildlife/Insects')}</div></div>`:''}
    ${col(row,'Ecological Benefits')?`<div class="modal-eco-block"><div class="modal-eco-label">🌱 Ecological Benefits</div><div class="modal-eco-text">${col(row,'Ecological Benefits')}</div></div>`:''}
    `:''}
    ${col(row,'Notes')?`<div class="modal-section-title">Gardener's Notes</div><div class="modal-notes">${col(row,'Notes')}</div>`:''}
    <div style="display:flex;gap:0.7rem;margin-top:1.5rem;">
      <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="openEditModal('${name.replace(/'/g,"\'")}')">✏️ Edit</button>
      <button class="btn btn-secondary" style="border-color:rgba(139,58,30,0.4);color:#c87a5a;" onclick="confirmDelete('${name.replace(/'/g,"\'")}')">🗑 Delete</button>
    </div>
  </div>`;
  modal.classList.add('open'); overlay.classList.add('open');
}

function closePlantModal(){
  document.getElementById('plant-modal').classList.remove('open');
  document.getElementById('modal-overlay').classList.remove('open');
}

function confirmDelete(plantName) {
  const modal = document.getElementById('plant-modal');
  const inner = modal.querySelector('.modal-inner');
  inner.innerHTML += `
    <div id="delete-confirm" style="margin-top:1rem;background:rgba(139,58,30,0.1);border:1px solid rgba(139,58,30,0.3);border-radius:10px;padding:1rem;text-align:center;">
      <div style="font-size:0.88rem;color:#c87a5a;margin-bottom:0.8rem;">Remove <strong>${plantName}</strong> from your garden?</div>
      <div style="display:flex;gap:0.6rem;justify-content:center;">
        <button class="btn btn-secondary" style="border-color:rgba(139,58,30,0.4);color:#c87a5a;" onclick="doDelete('${plantName.replace(/'/g,"\'")}')">Yes, remove it</button>
        <button class="btn btn-secondary" onclick="document.getElementById('delete-confirm').remove()">Cancel</button>
      </div>
    </div>`;
}

async function doDelete(plantName) {
  closePlantModal();
  await deleteRow(plantName);
  renderCurrentPage();
}

function openEditModal(plantName) {
  closePlantModal();
  const row = plantRows.find(r => col(r,'Common Name').toLowerCase() === plantName.toLowerCase());
  if (!row) return;

  const modal   = document.getElementById('plant-modal');
  const overlay = document.getElementById('modal-overlay');

  const g = colName => col(row, colName);

  modal.innerHTML = `<div class="modal-inner">
    <div class="modal-header">
      <div>
        <div class="modal-plant-name">✏️ Edit Plant</div>
        <div class="modal-sci-name">${g('Common Name')}</div>
      </div>
      <button class="modal-close" onclick="closePlantModal()">✕</button>
    </div>
    <div class="form-grid" style="margin-top:1rem;">
      <div class="form-group full"><div class="form-section-title">Identity</div></div>
      <div class="form-group">
        <label class="form-label">Common Name</label>
        <input class="form-input" id="e-name" value="${g('Common Name')}">
      </div>
      <div class="form-group">
        <label class="form-label">Scientific Name</label>
        <input class="form-input" id="e-sci" value="${g('Scientific Name')}">
      </div>
      <div class="form-group">
        <label class="form-label">Family</label>
        <input class="form-input" id="e-fam" value="${g('Family')}">
      </div>
      <div class="form-group">
        <label class="form-label">Growth Habit</label>
        <input class="form-input" id="e-growth" value="${g('Growth Habit')}">
      </div>
      <div class="form-group">
        <label class="form-label">Duration</label>
        <input class="form-input" id="e-dur" value="${g('Duration')}">
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <input class="form-input" id="e-pri" value="${g('Priority')}">
      </div>

      <div class="form-group full"><div class="form-section-title">Growing Conditions</div></div>
      <div class="form-group">
        <label class="form-label">Sun Requirement</label>
        <select class="form-select" id="e-sun">
          <option value="">Select...</option>
${getSunOptions(g('Sun Requirement'))}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Moisture Level</label>
        <input class="form-input" id="e-moist" value="${g('Moisture Level')}">
      </div>
      <div class="form-group">
        <label class="form-label">Bloom Time</label>
        <input class="form-input" id="e-bloom" value="${g('Bloom Time')}">
      </div>

      <div class="form-group full"><div class="form-section-title">Ecological Role</div></div>
      <div class="form-group full">
        <label class="form-label">Ecological Benefits</label>
        <input class="form-input" id="e-eco" value="${g('Ecological Benefits')}">
      </div>
      <div class="form-group full">
        <label class="form-label">Specific Wildlife / Insects</label>
        <input class="form-input" id="e-wild" value="${g('Specific Wildlife/Insects')}">
      </div>

      <div class="form-group full"><div class="form-section-title">Garden Details</div></div>
      <div class="form-group">
        <label class="form-label">Location in Yard</label>
        <input class="form-input" id="e-loc" value="${g('Location in Yard')}">
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="e-status">
          <option value="">Select...</option>
          ${['Planted','Found/Wild'].map(o=>`<option ${g('Status')===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      <div class="form-group full">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="e-notes">${g('Notes')}</textarea>
      </div>
    </div>
    <div style="display:flex;gap:0.7rem;margin-top:1.5rem;">
      <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="saveEdit('${plantName.replace(/'/g,"\'")}')">Save Changes</button>
      <button class="btn btn-secondary" onclick="closePlantModal()">Cancel</button>
    </div>
  </div>`;

  modal.classList.add('open');
  overlay.classList.add('open');
}

async function saveEdit(originalName) {
  const gv = id => document.getElementById(id)?.value?.trim() || '';
  const updatedRow = new Array(actualHeaders.length).fill('');
  const setCol = (name, val) => {
    const i = actualHeaders.findIndex(h => h === name);
    if (i >= 0) updatedRow[i] = val;
  };
  setCol('Common Name',             gv('e-name'));
  setCol('Scientific Name',          gv('e-sci'));
  setCol('Family',                   gv('e-fam'));
  setCol('Growth Habit',             gv('e-growth'));
  setCol('Duration',                 gv('e-dur'));
  setCol('Priority',                 gv('e-pri'));
  setCol('Sun Requirement',          gv('e-sun'));
  setCol('Moisture Level',           gv('e-moist'));
  setCol('Bloom Time',               gv('e-bloom'));
  setCol('Ecological Benefits',      gv('e-eco'));
  setCol('Specific Wildlife/Insects',gv('e-wild'));
  setCol('Location in Yard',         gv('e-loc'));
  setCol('Status',                   gv('e-status'));
  setCol('Notes',                    gv('e-notes'));
  closePlantModal();
  await updateRow(originalName, updatedRow);
  renderCurrentPage();
}

// ── Drawer ─────────────────────────────────────────────────────────────────
function openDrawer(title, names) {
  const items=names.map(n=>`<div class="drawer-item" onclick="openPlantModal('${n.replace(/'/g,"\\'")}')"><span>🌿 ${n}</span><span class="drawer-arrow">→</span></div>`).join('');
  document.getElementById('drawer-title').textContent=title;
  document.getElementById('drawer-count').textContent=`${names.length} plant${names.length!==1?'s':''}`;
  document.getElementById('drawer-list').innerHTML=items||'<div class="no-data">No plants found</div>';
  document.getElementById('plant-drawer').classList.add('open');
}

function openDrawerSimple(title,colName,match){
  openDrawer(title,plantRows.filter(r=>col(r,colName)===match).map(r=>col(r,'Common Name')).filter(Boolean));
}

function closeDrawer(){document.getElementById('plant-drawer').classList.remove('open');}

// ── Toast ───────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── Export ──────────────────────────────────────────────────────────────────
function exportToExcel(){
  const wb=XLSX.utils.book_new();
  const wsData=[SHEET_HEADERS,...plantRows];
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  XLSX.utils.book_append_sheet(wb,ws,'Plant Inventory');
  XLSX.writeFile(wb,'Native_Plant_Inventory_backup.xlsx');
  showToast('Excel backup downloaded ✓');
}
